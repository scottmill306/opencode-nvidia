version: '3.8'

services:
  # Triton Inference Server - GPU-accelerated model serving
  triton-server:
    image: nvcr.io/nvidia/tritonserver:23.12-py3
    ports:
      - "8000:8000"  # HTTP
      - "8001:8001"  # gRPC
      - "8002:8002"  # Metrics
    volumes:
      - ./models:/models
      - ./triton_server:/workspace
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      tritonserver --model-repository=/models
                   --http-port=8000
                   --grpc-port=8001
                   --metrics-port=8002
                   --log-verbose=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # FastAPI Backend - API gateway and business logic
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8000"
    environment:
      - TRITON_ENDPOINT=http://triton-server:8001
      - LOG_LEVEL=info
      - ALLOWED_ORIGINS=http://localhost:8080,http://127.0.0.1:8080
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - TOKEN_EXPIRY_MINUTES=60
      - MAX_PROMPT_LENGTH=10000
      - MAX_TOKENS_LIMIT=1024
    depends_on:
      triton-server:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G

  # Vector Database - Milvus for code embeddings
  milvus:
    image: milvusdb/milvus:v2.3.0
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    depends_on:
      - etcd
      - minio
    volumes:
      - milvus_data:/var/lib/milvus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  # etcd - Distributed key-value store for Milvus
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # MinIO - Object storage for Milvus
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin_secure}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-change_me_production_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # cuGraph Engine - GPU-accelerated graph analysis
  cugraph:
    image: rapidsai/cugraph:23.12-cuda11.8-py3.10
    ports:
      - "8787:8787"
    volumes:
      - ./scripts:/workspace/scripts
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: jupyter-lab --ip=0.0.0.0 --port=8787 --no-browser --allow-root
    restart: unless-stopped

volumes:
  milvus_data:
  etcd_data:
  minio_data:

networks:
  default:
    name: opencode-network
